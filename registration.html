<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrithi 2026 - Centralized Registration</title>
    <link rel="icon" href="Images/Logos/favicon_black_32x32.png" type="image/png">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/4bac6d041c.js" crossorigin="anonymous" async></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=1.0">

    <style>
        /* Standalone Registration Page Overrides */
        .registration-page-body {
            background-image: url('Images/Logos/Thrithi countdown BG.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .registration-card {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(243, 240, 224, 0.1);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            animation: cardFadeIn 0.8s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .registration-card-header {
            padding: 2rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .registration-card-title {
            color: #EAD7C5;
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #F3F0E0;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: opacity 0.2s;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            opacity: 1;
            color: #EAD7C5;
            text-decoration: none;
        }

        .back-link i {
            margin-right: 8px;
        }

        .registration-card-body {
            padding: 2rem;
        }

        /* iOS Safari does not support background-attachment:fixed */
        @media (max-width: 768px) {
            .registration-page-body {
                background-attachment: scroll;
            }
        }
    </style>
</head>

<body class="registration-page-body">

    <div class="registration-card">
        <div class="registration-card-header">
            <a href="index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
            <h1 class="registration-card-title" id="registrationPageTitle">Event Registration</h1>
            <p class="text-muted small">Thrithi 2026 — Official Registration Portal</p>
        </div>

        <div class="registration-card-body">

            <!-- STEP 1: School Filter + Event Selection -->
            <div id="centralStep1-events">
                <div class="registration-section">
                    <h6 class="section-title text-center mb-3">Select School &amp; Events</h6>

                    <!-- School Filter Dropdown -->
                    <select id="centralSchoolFilter" class="form-control reg-select school-filter-select mb-3">
                        <option value="all">🏫 All Schools</option>
                        <option value="law">⚖️ ICFAI Law School</option>
                        <option value="tech">💻 IcfaiTech (Faculty of Science &amp; Technology)</option>
                        <option value="ibs">📈 ICFAI Business School (IBS)</option>
                        <option value="socialScience">🌍 Faculty of Social Science</option>
                        <option value="architecture">🏛️ ICFAI Architecture</option>
                    </select>

                    <!-- Dynamic Events Container -->
                    <div id="centralDynamicEventCheckboxes" class="event-checkboxes-container flex-grow-1">
                        <!-- Events populated by JS -->
                        <div class="text-center p-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="sr-only">Loading events...</span>
                            </div>
                        </div>
                    </div>

                    <!-- Price Summary -->
                    <div class="total-amount-box text-center mt-3 mb-3">
                        Total Amount: <span id="centralStep1TotalAmount" class="font-weight-bold">₹0</span>
                    </div>

                    <button type="button" class="btn submit-proceed-btn w-100"
                        id="centralBtnProceedToRegistration">
                        Proceed to Registration
                    </button>
                </div>
            </div>

            <!-- STEP 2: Registration Form -->
            <div id="centralStep2-registration" style="display: none;">
                <form id="centralRegistrationForm">
                    <div class="registration-section">
                        <h6 class="section-title text-center mb-3">Registration Details</h6>

                        <div class="row">
                            <div class="col-md-6">
                                <input type="text" class="form-control reg-input" id="centralFullName"
                                    placeholder="Full Name*" required>
                            </div>
                            <div class="col-md-6">
                                <input type="tel" class="form-control reg-input" id="centralPhone"
                                    placeholder="Mobile No*" required>
                            </div>
                            <div class="col-md-12">
                                <input type="email" class="form-control reg-input" id="centralEmail"
                                    placeholder="Email ID*" required>
                            </div>
                            <div class="col-md-12">
                                <input type="text" class="form-control reg-input" id="centralCollege"
                                    placeholder="Institution Name*" required>
                            </div>
                        </div>

                        <!-- PDF Uploads -->
                        <div class="row mt-3">
                            <div class="col-md-6 mb-3">
                                <label class="text-white-50 small mb-1">Upload Aadhaar Card (JPG, PNG, PDF - Max 2MB)*</label>
                                <input type="file" class="form-control reg-input pt-1" id="centralAadhaarCard"
                                    accept="image/*,application/pdf" required>
                                <div id="centralAadhaarCardStatus" class="small mt-1 file-status-text"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="text-white-50 small mb-1">Upload College ID Card (JPG, PNG, PDF - Max 2MB)*</label>
                                <input type="file" class="form-control reg-input pt-1" id="centralCollegeIdCard"
                                    accept="image/*,application/pdf" required>
                                <div id="centralCollegeIdCardStatus" class="small mt-1 file-status-text"></div>
                            </div>
                        </div>

                        <hr class="my-3 border-light">

                        <!-- Summary of selection -->
                        <div class="selection-summary mb-3 p-2 rounded"
                            style="background: rgba(255,255,255,0.1);">
                            <small class="d-block text-muted">Selected Events: <span
                                    id="centralSummaryEventCount">0</span></small>
                            <div class="total-amount h6 mb-0 mt-1">
                                Total Amount to Pay: <span id="centralStep2TotalAmount"
                                    class="text-primary font-weight-bold">₹0</span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="button" class="btn btn-outline-secondary btn-sm px-4"
                                id="centralBtnBackToEvents">Back</button>
                            <button type="submit" class="btn submit-proceed-btn px-4">Submit &amp; Pay</button>
                        </div>
                    </div>
                </form>
            </div>

            <div id="alertContainer" class="alert-container mt-3" style="position: static; width: 100%; transform: none; visibility: visible;"></div>

        </div>
    </div>

    <!-- jQuery and Bootstrap JS via CDN -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="scripts.js"></script>
</body>

</html>
